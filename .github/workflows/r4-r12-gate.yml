name: R4-R12 Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "copilot/**"

jobs:
  r4_r12_gate:
    name: r4-r12-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run R4/R12 scoped tests + coverage floor
        run: |
          pytest -q \
            tests/test_contracts.py \
            tests/test_sigma2.py \
            tests/test_reference_predication_interface.py \
            --cov=arabic_engine.contracts \
            --cov=arabic_engine.reference_predication \
            --cov-report=term-missing \
            --cov-fail-under=85
